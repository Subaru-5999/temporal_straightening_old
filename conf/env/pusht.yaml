name: pusht
args: []
kwargs: 
  with_velocity: true
  with_target: true

dataset:
  _target_: "datasets.pusht_dset.load_pusht_slice_train_val"
  with_velocity: true
  n_rollout: null
  normalize_action: ${normalize_action}
  data_path: ${oc.env:DATASET_DIR}/pusht_noise
  split_ratio: 0.9
  transform:
    _target_: "datasets.img_transforms.default_transform"
    img_size: ${img_size}

decoder_path: null
# DataLoader workers. Pod has 224 cores / 2 TB RAM / 32 GB shm, so 16 is safe and
# avoids I/O starvation. Can be pushed higher (e.g. env.num_workers=32) if needed.
num_workers: 16