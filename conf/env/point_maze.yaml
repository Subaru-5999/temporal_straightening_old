name: point_maze
save_name: umaze
args: []
kwargs: {}

dataset:
  _target_: "datasets.point_maze_dset.load_point_maze_slice_train_val"
  n_rollout: null
  normalize_action: ${normalize_action}
  data_path: ${oc.env:DATASET_DIR}/point_maze
  split_ratio: 0.9
  use_preprocessed: false
  use_frame_files: false
  transform:
    _target_: "datasets.img_transforms.default_transform"
    img_size: ${img_size}

decoder_path: null
# DataLoader workers. Pod has 224 cores / 2 TB RAM / 32 GB shm, so 16 is safe and
# avoids I/O starvation. Can be pushed higher (e.g. env.num_workers=32) if needed.
num_workers: 16
